<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classic Snake</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #111a2e;
      --panel-2: #17233b;
      --text: #f4f7fb;
      --muted: #9fb0c8;
      --grid: rgba(255, 255, 255, 0.055);
      --snake: #52d273;
      --snake-head: #96f2a5;
      --dot: #ffcf56;
      --danger: #ff6b6b;
      --focus: #79b8ff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(82, 210, 115, 0.16), transparent 28rem),
        radial-gradient(circle at 85% 20%, rgba(255, 207, 86, 0.14), transparent 24rem),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: min(100%, 1040px);
      display: grid;
      grid-template-columns: minmax(320px, 680px) minmax(240px, 300px);
      gap: 18px;
      align-items: stretch;
    }

    .game-shell, .side-panel {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(17, 26, 46, 0.86);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(18px);
    }

    .game-shell {
      border-radius: 8px;
      padding: clamp(12px, 2vw, 18px);
      min-width: 0;
    }

    .topbar {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 3.2vw, 2.25rem);
      line-height: 1;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
      min-height: 1.25rem;
      text-align: right;
    }

    .board-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      max-height: calc(100vh - 180px);
      margin: 0 auto;
      border-radius: 8px;
      overflow: hidden;
      background: #08111d;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0));
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(8, 17, 29, 0.74);
      text-align: center;
      transition: opacity 160ms ease, visibility 160ms ease;
    }

    .overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .overlay-content {
      max-width: 390px;
      display: grid;
      gap: 14px;
    }

    .overlay h2 {
      margin: 0;
      font-size: clamp(1.7rem, 5vw, 3rem);
      line-height: 1.05;
    }

    .overlay p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .side-panel {
      border-radius: 8px;
      padding: 18px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      min-height: 86px;
      border-radius: 8px;
      background: var(--panel-2);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 12px;
      display: grid;
      align-content: center;
      gap: 6px;
    }

    .label {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .value {
      font-size: clamp(1.55rem, 4vw, 2rem);
      font-weight: 800;
      line-height: 1;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      color: #06101a;
      background: var(--dot);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
    }

    button:hover { filter: brightness(1.06); }
    button:active { transform: translateY(1px); }

    .secondary {
      color: var(--text);
      background: #22304f;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .pad {
      display: none;
      grid-template-columns: repeat(3, minmax(64px, 1fr));
      gap: 10px;
      justify-items: stretch;
      touch-action: manipulation;
      user-select: none;
    }

    .pad button {
      min-height: 64px;
      background: #22304f;
      color: var(--text);
      font-size: 1.6rem;
      line-height: 1;
      margin: 0;
    }

    .pad .blank {
      visibility: hidden;
      pointer-events: none;
    }

    .tips {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.94rem;
    }

    .tips strong {
      color: var(--text);
      font-weight: 700;
    }

    @media (max-width: 820px) {
      body {
        padding: 12px;
        place-items: start center;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .board-wrap {
        max-height: none;
      }

      .topbar {
        align-items: flex-start;
      }

      .status {
        max-width: 45%;
        font-size: 0.86rem;
      }

      .side-panel {
        padding: 14px;
      }

      .pad {
        display: grid;
      }
    }

    @media (max-width: 440px) {
      .topbar {
        display: grid;
        gap: 8px;
      }

      .status {
        max-width: none;
        text-align: left;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Classic Snake game">
    <section class="game-shell">
      <div class="topbar">
        <h1>Classic Snake</h1>
        <div class="status" id="status">Press Start</div>
      </div>

      <div class="board-wrap">
        <canvas id="board" width="640" height="640" aria-label="Snake game board"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay-content">
            <h2 id="overlayTitle">Ready?</h2>
            <p id="overlayText">Eat dots to grow. Grab timed bonus dots for 30 points and a speed reset.</p>
            <button id="overlayStart" type="button">Start Game</button>
          </div>
        </div>
      </div>
    </section>

    <aside class="side-panel" aria-label="Game controls and score">
      <div class="stats">
        <div class="stat"><span class="label">Score</span><span class="value" id="score">0</span></div>
        <div class="stat"><span class="label">Best</span><span class="value" id="best">0</span></div>
        <div class="stat"><span class="label">Length</span><span class="value" id="length">3</span></div>
        <div class="stat"><span class="label">Speed</span><span class="value" id="speed">1x</span></div>
      </div>

      <div class="controls">
        <button id="start" type="button">Start</button>
        <button class="secondary" id="pause" type="button">Pause</button>
      </div>

      <div class="pad" aria-label="Touch controls">
        <button class="blank" type="button" tabindex="-1"></button>
        <button data-dir="up" type="button" aria-label="Move up">&uarr;</button>
        <button class="blank" type="button" tabindex="-1"></button>
        <button data-dir="left" type="button" aria-label="Move left">&larr;</button>
        <button data-dir="down" type="button" aria-label="Move down">&darr;</button>
        <button data-dir="right" type="button" aria-label="Move right">&rarr;</button>
      </div>

      <ul class="tips">
        <li><strong>Move:</strong> arrow keys or W A S D</li>
        <li><strong>Pause:</strong> spacebar</li>
        <li><strong>Restart:</strong> press Start after a crash</li>
      </ul>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const lengthEl = document.getElementById("length");
    const speedEl = document.getElementById("speed");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("start");
    const pauseBtn = document.getElementById("pause");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const overlayStart = document.getElementById("overlayStart");

    const grid = 24;
    const cell = canvas.width / grid;
    const normalDelay = 140;
    const fastestDelay = 62;
    const speedStep = 12;
    const bonusDuration = 5000;
    const minBonusWait = 7000;
    const maxBonusWait = 13000;

    const directions = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };

    let snake;
    let dot;
    let bonusDot;
    let bonusExpiresAt;
    let nextBonusAt;
    let direction;
    let queuedDirection;
    let score;
    let best = Number(localStorage.getItem("classicSnakeBest") || 0);
    let speedLevel;
    let tickDelay;
    let tickTimer = null;
    let running = false;
    let paused = false;
    let gameOver = false;

    bestEl.textContent = best;

    function resetGame() {
      const center = Math.floor(grid / 2);
      snake = [
        { x: center, y: center },
        { x: center - 1, y: center },
        { x: center - 2, y: center }
      ];

      direction = directions.right;
      queuedDirection = directions.right;
      score = 0;
      speedLevel = 1;
      tickDelay = normalDelay;
      paused = false;
      gameOver = false;
      dot = randomDot();
      bonusDot = null;
      bonusExpiresAt = 0;
      nextBonusAt = Date.now() + randomBonusWait();

      updateStats();
      setStatus("Ready");
      draw();
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function updateStats() {
      scoreEl.textContent = score;
      bestEl.textContent = best;
      lengthEl.textContent = snake.length;
      speedEl.textContent = `${speedLevel}x`;
    }

    function randomBonusWait() {
      return minBonusWait + Math.floor(Math.random() * (maxBonusWait - minBonusWait + 1));
    }

    function occupiedCells(extraCells = []) {
      const occupied = new Set(snake.map(part => `${part.x},${part.y}`));
      extraCells.forEach(cellPos => {
        if (cellPos) occupied.add(`${cellPos.x},${cellPos.y}`);
      });
      return occupied;
    }

    function randomFreeCell(extraCells = []) {
      const occupied = occupiedCells(extraCells);
      let next;
      do {
        next = {
          x: Math.floor(Math.random() * grid),
          y: Math.floor(Math.random() * grid)
        };
      } while (occupied.has(`${next.x},${next.y}`));
      return next;
    }

    function randomDot() {
      return randomFreeCell([bonusDot]);
    }

    function scheduleNextBonus() {
      bonusDot = null;
      bonusExpiresAt = 0;
      nextBonusAt = Date.now() + randomBonusWait();
    }

    function updateBonusDot() {
      const now = Date.now();

      if (bonusDot && now >= bonusExpiresAt) {
        scheduleNextBonus();
      }

      if (!bonusDot && now >= nextBonusAt) {
        bonusDot = randomFreeCell([dot]);
        bonusExpiresAt = now + bonusDuration;
      }
    }

    function setDirection(next) {
      const wanted = directions[next];
      if (!wanted) return;

      const reverse = wanted.x + direction.x === 0 && wanted.y + direction.y === 0;
      if (!reverse) queuedDirection = wanted;
    }

    function startGame() {
      resetGame();
      running = true;
      overlay.classList.add("hidden");
      setStatus("Playing");
      clearInterval(tickTimer);
      tickTimer = setInterval(tick, tickDelay);
    }

    function togglePause() {
      if (!running || gameOver) return;

      paused = !paused;
      pauseBtn.textContent = paused ? "Resume" : "Pause";
      setStatus(paused ? "Paused" : "Playing");
      overlay.classList.toggle("hidden", !paused);
      overlayTitle.textContent = "Paused";
      overlayText.textContent = "Take a breath. Your snake is waiting right where you left it.";
      overlayStart.textContent = "Resume";
    }

    function resumeFromOverlay() {
      if (paused) togglePause();
      else startGame();
    }

    function tick() {
      if (paused || gameOver) return;

      updateBonusDot();
      direction = queuedDirection;

      const head = snake[0];
      const nextHead = {
        x: (head.x + direction.x + grid) % grid,
        y: (head.y + direction.y + grid) % grid
      };

      const bodyBeforeTailMoves = snake.slice(0, -1);
      const hitSelf = bodyBeforeTailMoves.some(part => part.x === nextHead.x && part.y === nextHead.y);

      if (hitSelf) {
        endGame();
        return;
      }

      snake.unshift(nextHead);

      const ateDot = nextHead.x === dot.x && nextHead.y === dot.y;
      const ateBonus = bonusDot && nextHead.x === bonusDot.x && nextHead.y === bonusDot.y;

      if (ateDot) {
        score += 10;

        if (score > best) {
          best = score;
          localStorage.setItem("classicSnakeBest", String(best));
        }

        if (score % 50 === 0) increaseSpeed();
        dot = randomDot();
      } else if (ateBonus) {
        score += 30;

        if (score > best) {
          best = score;
          localStorage.setItem("classicSnakeBest", String(best));
        }

        resetSpeed();
        scheduleNextBonus();
        snake.pop();
      } else {
        snake.pop();
      }

      updateStats();
      draw();
    }

    function increaseSpeed() {
      speedLevel += 1;
      tickDelay = Math.max(fastestDelay, tickDelay - speedStep);
      clearInterval(tickTimer);
      tickTimer = setInterval(tick, tickDelay);
    }

    function resetSpeed() {
      speedLevel = 1;
      tickDelay = normalDelay;
      clearInterval(tickTimer);
      tickTimer = setInterval(tick, tickDelay);
    }

    function endGame() {
      gameOver = true;
      running = false;
      clearInterval(tickTimer);
      pauseBtn.textContent = "Pause";
      setStatus("Game Over");
      overlay.classList.remove("hidden");
      overlayTitle.textContent = "Game Over";
      overlayText.textContent = `Final score: ${score}. Press Start to try again.`;
      overlayStart.textContent = "Play Again";
      updateStats();
      draw();
    }

    function drawGrid() {
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--grid");
      ctx.lineWidth = 1;

      for (let i = 1; i < grid; i += 1) {
        const pos = i * cell;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, canvas.height);
        ctx.moveTo(0, pos);
        ctx.lineTo(canvas.width, pos);
        ctx.stroke();
      }
    }

    function drawDot() {
      const x = dot.x * cell + cell / 2;
      const y = dot.y * cell + cell / 2;
      const pulse = 1 + Math.sin(Date.now() / 160) * 0.08;

      ctx.save();
      ctx.shadowColor = "#ff4d4d";
      ctx.shadowBlur = 24;
      ctx.fillStyle = "#ff4d4d";
      ctx.beginPath();
      ctx.arc(x, y, cell * 0.42 * pulse, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = 3;
      ctx.strokeStyle = "#ffe8a3";
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.fillStyle = "#ffe8a3";
      ctx.beginPath();
      ctx.arc(x - cell * 0.13, y - cell * 0.13, cell * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawBonusDot() {
      if (!bonusDot) return;

      const x = bonusDot.x * cell + cell / 2;
      const y = bonusDot.y * cell + cell / 2;
      const timeLeft = Math.max(0, bonusExpiresAt - Date.now());
      const pulse = 1 + Math.sin(Date.now() / 90) * 0.12;

      ctx.save();
      ctx.shadowColor = "#7cc7ff";
      ctx.shadowBlur = 28;
      ctx.fillStyle = "#7cc7ff";
      ctx.beginPath();
      ctx.arc(x, y, cell * 0.46 * pulse, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.fillStyle = "#ffffff";
      ctx.font = `bold ${cell * 0.58}px Arial`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("30", x, y + 1);

      ctx.strokeStyle = timeLeft < 1600 ? "#ff6b6b" : "#ffe45c";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, cell * 0.62, -Math.PI / 2, -Math.PI / 2 + (Math.PI * 2 * timeLeft / bonusDuration));
      ctx.stroke();
      ctx.restore();
    }

    function segmentAxis(index) {
      if (index === 0) {
        return Math.abs(direction.x) > 0 ? "horizontal" : "vertical";
      }

      const part = snake[index];
      const before = snake[index - 1];
      const after = snake[index + 1] || before;
      const touchesHorizontally = before.y === part.y || after.y === part.y;

      return touchesHorizontally ? "horizontal" : "vertical";
    }

    function drawBodySegment(part, index) {
      const axis = segmentAxis(index);
      const size = cell * 0.84;
      const x = part.x * cell + (cell - size) / 2;
      const y = part.y * cell + (cell - size) / 2;
      const radius = size * 0.34;

      ctx.save();
      ctx.shadowColor = "rgba(82, 210, 115, 0.22)";
      ctx.shadowBlur = 8;
      ctx.fillStyle = "#178a3f";
      ctx.strokeStyle = "#d8ffd8";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(x, y, size, size, radius);
      ctx.fill();
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.fillStyle = "#ffd84d";
      ctx.beginPath();

      if (axis === "horizontal") {
        ctx.roundRect(x + size * 0.38, y + 1, size * 0.24, size - 2, radius * 0.5);
      } else {
        ctx.roundRect(x + 1, y + size * 0.38, size - 2, size * 0.24, radius * 0.5);
      }

      ctx.fill();
      ctx.restore();
    }

    function headAngle() {
      if (direction.x === -1) return Math.PI;
      if (direction.y === -1) return -Math.PI / 2;
      if (direction.y === 1) return Math.PI / 2;
      return 0;
    }

    function drawHead() {
      const head = snake[0];
      const centerX = head.x * cell + cell / 2;
      const centerY = head.y * cell + cell / 2;
      const size = cell * 0.96;

      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(headAngle());

      ctx.shadowColor = "rgba(150, 242, 165, 0.45)";
      ctx.shadowBlur = 14;
      ctx.fillStyle = "#13823c";
      ctx.strokeStyle = "#d8ffd8";
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.roundRect(-size * 0.5, -size * 0.46, size, size * 0.92, size * 0.25);
      ctx.fill();
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.fillStyle = "#ffd84d";
      ctx.beginPath();
      ctx.roundRect(-size * 0.16, -size * 0.41, size * 0.16, size * 0.82, size * 0.08);
      ctx.fill();

      ctx.fillStyle = "#ffe45c";
      ctx.beginPath();
      ctx.arc(size * 0.22, -size * 0.18, size * 0.13, 0, Math.PI * 2);
      ctx.arc(size * 0.22, size * 0.18, size * 0.13, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#07120a";
      ctx.beginPath();
      ctx.arc(size * 0.25, -size * 0.18, size * 0.055, 0, Math.PI * 2);
      ctx.arc(size * 0.25, size * 0.18, size * 0.055, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#ff6b6b";
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(size * 0.42, 0);
      ctx.lineTo(size * 0.55, 0);
      ctx.moveTo(size * 0.55, 0);
      ctx.lineTo(size * 0.65, -size * 0.07);
      ctx.moveTo(size * 0.55, 0);
      ctx.lineTo(size * 0.65, size * 0.07);
      ctx.stroke();
      ctx.restore();
    }

    function drawSnake() {
      for (let index = snake.length - 1; index > 0; index -= 1) {
        drawBodySegment(snake[index], index);
      }

      drawHead();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#08111d";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawDot();
      drawBonusDot();
      drawSnake();
    }

    document.addEventListener("keydown", event => {
      const keyMap = {
        ArrowUp: "up",
        w: "up",
        W: "up",
        ArrowDown: "down",
        s: "down",
        S: "down",
        ArrowLeft: "left",
        a: "left",
        A: "left",
        ArrowRight: "right",
        d: "right",
        D: "right"
      };

      if (event.key in keyMap) {
        event.preventDefault();
        setDirection(keyMap[event.key]);
      }

      if (event.key === " ") {
        event.preventDefault();
        togglePause();
      }

      if (event.key === "Enter" && (!running || paused)) {
        event.preventDefault();
        resumeFromOverlay();
      }
    });

    document.querySelectorAll("[data-dir]").forEach(button => {
      button.addEventListener("click", () => setDirection(button.dataset.dir));
      button.addEventListener("touchstart", event => {
        event.preventDefault();
        setDirection(button.dataset.dir);
      }, { passive: false });
    });

    startBtn.addEventListener("click", startGame);
    pauseBtn.addEventListener("click", togglePause);
    overlayStart.addEventListener("click", resumeFromOverlay);

    resetGame();
  </script>
</body>
</html>
